title: Password Spray - Multiple Failed Logons from Single Source
id: 1a2b3c4d-5e6f-7890-abcd-ef1234567890
status: experimental
description: Detects multiple failed logon attempts from a single source IP across multiple user accounts within a time window
references:
    - https://attack.mitre.org/techniques/T1110/003
    - https://www.microsoft.com/en-us/defender/threat-intelligence
author: SOC Lab
date: 2024/06/10
modified: 2024/06/10
tags:
    - attack.credential_access
    - attack.t1110_003
    - attack.t1110
    - detection.windows_security
logsource:
    product: windows
    service: security
detection:
    selection_failures:
        EventID: 4625
        Logon_Type:
            - 2
            - 10
            - 3
    filter_source:
        Source_Network_Address:
            - 127.0.0.1
            - ::1
    timeframe: 10m
    condition: selection_failures and not filter_source | count(Account_Name) by Source_Network_Address >= 5
falsepositives:
    - Help desk staff conducting account access verification
    - Automated account provisioning or testing
    - VPN or proxy logon events
level: medium
